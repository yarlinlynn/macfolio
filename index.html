<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta 
      name="description" 
      content=""
    >

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/svg+xml">
    <title>Macfolio</title>

    <!-- css files -->
    <link rel="stylesheet" href="/css/style.css"/>

    <!-- icons link -->
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet"
    />

</head>
<body>

    <header id="top-bar">

        <!-- desktop header -->
        <div class="desktop-header">
            <!-- apple logo -->
            <div class="desktop">
                <img src="/assets/icons/logo.svg" alt="Apple Logo" loading="lazy"/>
                <p>Yarlin's Desktop</p>
            </div>

            <!-- naviagtion for socials -->
            <ul class="desktop-socials">
                <li>Skills</li>
                <li>Contact</li>
                <li>Work</li>
            </ul>

            <!-- desktop icons -->
            <ul class="desktop-icons">
                <li>
                    <img class="battery" src="/assets/icons/battery.svg" alt="Battery" loading="lazy"/>
                </li>
                <li>
                    <img src="/assets/icons/wifi.svg" alt="Wifi" loading="lazy"/>
                </li>
                <li>
                    <img src="/assets/icons/search.svg" alt="Search" loading="lazy"/>
                </li>
                <li>
                    <img src="/assets/icons/mode.svg" alt="Light/Dark Toggle " loading="lazy"/>
                </li>
                <li>
                    <img class="siri" src="/assets/icons/siri.png" alt="Siri" loading="lazy"/>
                </li>
            </ul>

            <!-- date and time -->
            <div class="date-time">
                <span>
                    Tue July 7
                    <span>14:17</span>
                </span>
            </div>
        </div>

        <!-- mobile header -->
        <div class="mobile-header">
            <!-- status bar -->
            <div class="status-bar">
                <img src="/assets/icons/bars.svg" alt="Cell Service" loading="lazy"/>
                <span>Cell C</span>
                <img src="/assets/icons/wifi.svg" alt="Wifi" loading="lazy"/>
            </div>

            <!-- time -->
            <span>14:20</span>

            <!-- mobile icons -->
            <div class="battery-life">
                95%
                <img src="/assets/icons/battery.svg" alt="Battery" loading="lazy"/>
            </div>
        </div>
    </header>

    <main id="workspace">

        <section id="mobile">
            <section id="mobile-apps">
                <ul class="apps-list">
                    <li class="list-item">
                        <img src="/assets/apps/calendar-mobile.png" alt="Calendar" loading="lazy"/>

                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/photos.png" alt="Photos" loading="lazy"/>
                        <span>Photos</span>
                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/camera.png" alt="Camera" loading="lazy"/>
                        <span>Camera</span>
                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/clock.png" alt="Clock" loading="lazy"/>

                    </li>

                    <li class="list-item">
                        <img src="/assets/apps/facetime.png" alt="FaceTime" loading="lazy"/>

                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/github.png" alt="GitHub" loading="lazy"/>
                        <span>GitHub</span>
                    </li>
                    <!-- <li class="list-item">
                        <img src="/assets/apps/township.png" alt="Township" loading="lazy"/>
                    </li> -->
                    <li class="list-item">
                        <img src="/assets/apps/weather.png" alt="Weather" loading="lazy"/>
                        <span>Weather</span>
                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/settings.png" alt="Settings" loading="lazy"/>
                        <span>Settings</span>
                    </li>

                    <li class="list-item">
                        <img src="/assets/apps/appstore.png" alt="App Store" loading="lazy"/>
                        <span>App Store</span>
                    </li>
                    <li class="list-item">

                        <span>Gmail</span>
                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/translate.png" alt="Translate" loading="lazy"/>
                        <span>Translate</span>
                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/calculator.png" alt="Calculator" loading="lazy"/>
                        <span>Calculator</span>
                    </li>

                    <li class="list-item">
                        <img src="/assets/apps/notes.png" alt="Notes" loading="lazy"/>
                        <span>Notes</span>
                    </li>
                    <!-- <li class="list-item">
                        <img src="/assets/apps/github.png" alt="GitHub" loading="lazy"/>
                    </li> -->
                    <li class="list-item">
                        <img src="/assets/apps/instagram.png" alt="Instagram" loading="lazy"/>
                        <span>Instagram</span>
                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/twitter.png" alt="Twitter" loading="lazy"/>
                        <span>X</span>
                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/linkedin.png" alt="LinkedIn" loading="lazy"/>
                        <span>LinkedIn</span>
                    </li>

                    <li class="list-item">
                        <img src="/assets/apps/tiktok.png" alt="TitTok" loading="lazy"/>
                        <span>TitTok</span>
                    </li>
                    <li class="list-item">
                        <img src="/assets/apps/files.png" alt="Files" loading="lazy"/>
                        <span>Files</span>
                    </li>
                </ul>
            </section>
            <section id="pages">
                <i class="ri-circle-fill page-icon"></i>
                <i class="ri-circle-fill page-icon"></i>
            </section>
        </section>

        <ul class="dock-container">

            <li class="dock-item" id="phone">

            </li>

            </li>

            </li>
            <li class="dock-item" id="appstore">

            </li>
            <li class="dock-item" id="settings">

            </li>
            <li class="dock-item" id="siri">
                <img src="/assets/apps/siri.png" alt="Siri" loading="lazy"/>
            </li>
            <li class="dock-item" id="terminal">
                <img src="/assets/apps/terminal.png" alt="Terminal" loading="lazy"/>
            </li>
            <!-- desktop icon -->

            <li class="dock-item" id="spotify">
                <img src="/assets/apps/spotify.png" alt="Spotify" loading="lazy"/>

            <li class="dock-item" id="trash">
